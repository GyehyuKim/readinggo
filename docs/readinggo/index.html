<style>
@font-face{
  font-family: 'Moneygraphy Rounded';
  src: url('fonts/Moneygraphy-Rounded.otf') format('opentype');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}
@font-face{
  font-family: 'Moneygraphy Pixel';
  src: url('fonts/Moneygraphy-Pixel.otf') format('opentype');
  font-weight: 400 900;
  font-style: normal;
  font-display: swap;
}
:root{
  --paper:        #FAF6F0;
  --paper-2:      #F4EFE6;
  --card:         #FFFFFF;
  --card-soft:    #FFF9F0;
  --ink:          #2A2D33;
  --ink-2:        #5A5F69;
  --ink-3:        #9097A0;
  --ink-4:        #C7CCD3;
  --line:         #ECE6DA;
  --line-2:       #F2EDE2;
  --brand:        #3FD17F;
  --brand-2:      #2EB867;
  --brand-3:      #1F8E4D;
  --brand-soft:   #DFF6EA;
  --brand-tint:   #F1FBF5;
  --brand-shadow: #1F8E4D;
  --fire:         #FF8A3D;
  --fire-2:       #FFA970;
  --fire-soft:    #FFE6D4;
  --fire-shadow:  #D8651F;
  --gold:         #FFC233;
  --gold-2:       #FFD66B;
  --gold-soft:    #FFF1C7;
  --gold-shadow:  #C8901C;
  --blue:         #5AB5F0;
  --blue-soft:    #E1F1FB;
  --rose:         #F08A9A;
  --rose-soft:    #FCE4E9;
  --violet:       #B690F0;
  --violet-soft:  #ECE2FB;
  --shadow-1:  0 1px 2px rgba(20,20,30,.04), 0 6px 18px rgba(20,20,30,.06);
  --shadow-2:  0 2px 6px rgba(20,20,30,.06), 0 12px 28px rgba(20,20,30,.08);
  --shadow-mint: 0 8px 22px rgba(63,209,127,.25);
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family: 'Moneygraphy Rounded','Noto Sans KR',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.2px;
}
button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}

.pixel,
.stat span:not(.ico),
.path .node,
.book-progress-num,
.nest-stage,
.page-num,
.page-num span,
.page-direct input,
.page-totalmark,
.sentence-counter,
.reward-card .val,
.reward-card .lbl,
.league-rank,
.league-xp,
.trank-rank,
.trank-page,
.friend-nest .streakmini,
.shelf-prog,
.sentence-card .meta{
  font-family: 'Moneygraphy Pixel', 'Moneygraphy Rounded', monospace;
  letter-spacing: 0.5px;
}
.stat span:not(.ico){ font-weight: 400; font-size: 13px; }
.path .node{ font-weight: 400; }
.reward-card .val{ font-weight: 400; letter-spacing: 1px; }
.reward-card .lbl{ font-weight: 400; letter-spacing: 1.2px; }
.league-rank{ font-weight: 400; letter-spacing: 1px; }
.league-xp{ font-weight: 400; letter-spacing: 1px; }
.trank-rank{ font-weight: 400; letter-spacing: 1px; }
.trank-page{ font-weight: 400; letter-spacing: 1px; }
.nest-stage{ letter-spacing: 1px; }
.page-num{ font-weight: 400; letter-spacing: 1.5px; }

.stage{
  min-height: 100vh;
  display: flex;
  justify-content: center;
  background:
    radial-gradient(900px 480px at 50% -200px, #DDF6E7 0%, transparent 60%),
    var(--paper);
}
.app{
  width: 100%;
  max-width: 430px;
  height: 100vh;
  height: 100dvh;            /* 뷰포트 고정 → main 만 스크롤, 하단 탭바 고정 (QA #7) */
  background: var(--paper);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
@media (min-width: 800px){
  .stage{ padding: 32px 20px 64px; }
  .app{
    border-radius: 36px;
    box-shadow: 0 30px 80px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.05);
    height: min(920px, calc(100vh - 64px));
    overflow: hidden;
    border: 1px solid var(--line);
  }
}

.topbar{
  position: sticky; top: 0; z-index: 20;
  background: rgba(250,246,240,.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 8px 14px;
}
.topbar-row{ display:flex; align-items:center; gap: 8px; }
.brand-mark{
  display:flex; align-items:center; gap:7px;
  font-weight: 900; font-size: 17px; letter-spacing:-.3px;
  color: var(--ink); cursor:pointer; flex-shrink:0;
}
.brand-mark .sparrow{
  width: 28px; height: 28px;
  display:inline-flex; align-items:center; justify-content:center;
  background: var(--brand);
  border-radius: 12px;
  border-bottom: 3px solid var(--brand-shadow);
  font-size: 18px;
  color:#fff;
}
.brand-mark .go{ color: var(--brand-2); }

.topbar-stats{
  margin-left:auto; display:flex; gap:4px; align-items:center;
  flex-wrap:nowrap; justify-content:flex-end;   /* 한 줄 고정 — 줄바꿈 높이 낭비 방지 (#205) */
  min-width:0; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;
}
.topbar-stats::-webkit-scrollbar{ display:none; }
.stat{
  display:inline-flex; align-items:center; gap:3px;
  padding: 4px 7px;
  border-radius: 999px;
  background: var(--card);
  border: 1.5px solid var(--line);
  font-weight: 800; font-size: 11px;
  color: var(--ink); white-space:nowrap; flex-shrink:0;
}
.stat .ico{ font-size: 13px; }
.stat.fire{ color: var(--fire-shadow); border-color: var(--fire-soft); background: #FFF7EE; }
.stat.gold{ color: var(--gold-shadow); border-color: var(--gold-soft); background: #FFFAE3; }
.stat.league{ color: var(--brand-3); border-color: var(--brand-soft); background: var(--brand-tint); }
.stat.lv{ color: var(--gold-shadow); border-color: var(--gold-soft); background: var(--gold-soft); padding: 6px 9px; }

.main{
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 110px;
}
.main::-webkit-scrollbar{ width: 0; }

.view{ display: none; animation: fadeUp .28s ease both; }
.view.active{ display: block; }

@keyframes fadeUp{
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; }
}

.card{
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px;
  box-shadow: var(--shadow-1);
}

.book-card{
  display:flex; gap:14px; align-items:flex-start;
}
.book-cover{
  width: 64px; height: 88px;
  border-radius: 8px;
  background: linear-gradient(135deg, #F4D9A8, #E8B473);
  box-shadow: 0 4px 10px rgba(80,50,10,.18), inset 0 -4px 0 rgba(0,0,0,.08);
  position: relative; flex: none;
  overflow: hidden;
}
.book-cover img{ width:100%; height:100%; object-fit:cover; display:block; }
.book-meta{ flex: 1; min-width: 0; }
.book-title{
  font-weight: 900; font-size: 17px; letter-spacing:-.2px;
  color: var(--ink); margin: 0 0 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.book-author{ font-size: 13px; color: var(--ink-3); margin: 0 0 10px; }
.book-progress-row{ display:flex; align-items:center; gap:8px; }
.book-progress{
  flex: 1;
  height: 10px; border-radius: 999px;
  background: var(--line-2); overflow: hidden;
  position: relative;
}
.book-progress > span{
  display:block; height: 100%;
  background: linear-gradient(90deg, var(--brand) 0%, var(--brand-2) 100%);
  border-radius: 999px;
  transition: width .6s cubic-bezier(.2,.8,.2,1);
}
.book-progress-num{
  font-size: 12px; font-weight: 800; color: var(--ink-2);
  white-space: nowrap;
}

.path-wrap{
  margin-top: 16px;
  background: var(--brand-tint);
  border: 1.5px solid var(--brand-soft);
  border-radius: var(--r-md);
  padding: 14px 12px 10px;
}
.path-label{
  font-size: 11px; font-weight: 800; color: var(--brand-3);
  letter-spacing: .4px; text-transform: uppercase;
  margin-bottom: 8px;
  display:flex; align-items:center; gap:6px;
}
.path{
  position: relative; height: 64px;
  display:flex; align-items:center; justify-content: space-between;
  padding: 0 6px;
}
.path::before{
  content:""; position:absolute; left:14px; right:14px; top:50%;
  height: 3px; background: repeating-linear-gradient(
    90deg, var(--brand) 0 6px, transparent 6px 12px
  );
  transform: translateY(-50%);
  opacity: .55;
}
.path .node{
  position: relative; z-index:1;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--card);
  border: 2px solid var(--brand-soft);
  display:flex; align-items:center; justify-content:center;
  font-size: 13px; font-weight: 900;
  color: var(--ink-3);
}
.path .node.done{
  background: var(--brand);
  border-color: var(--brand-2);
  color: #fff;
  box-shadow: 0 4px 0 var(--brand-shadow);
}
.path .node.today{
  background: var(--gold);
  border-color: var(--gold-shadow);
  color: var(--ink);
  box-shadow: 0 4px 0 var(--gold-shadow);
  animation: bounce 1.4s ease-in-out infinite;
}
.path .node.ghost{
  background: transparent;
  border: 2px dashed var(--ink-4);
  color: var(--ink-4);
}
.path .node:nth-child(odd){ transform: translateY(-12px); }
.path .node:nth-child(even){ transform: translateY(10px); }
.path .node.today:nth-child(odd){ transform: translateY(-12px); }
.path .node.today:nth-child(even){ transform: translateY(10px); }

/* 마을 마일스톤 진행 바 (S3: 구 path-wrap에서 분리) */
.town-milestone{
  margin-top: 16px;
  background: var(--brand-tint);
  border: 1.5px solid var(--brand-soft);
  border-radius: var(--r-md);
  padding: 14px 12px 10px;
}
.town-milestone-label{
  font-size: 11px; font-weight: 800; color: var(--brand-3);
  letter-spacing: .4px; text-transform: uppercase;
  margin-bottom: 8px;
  display:flex; align-items:center; gap:6px;
}

@keyframes bounce{
  0%,100%{ transform: translateY(-12px); }
  50%   { transform: translateY(-18px); }
}

.nest-theatre{
  --health: 80;
  --decay: 0.20;
  margin-top: 14px;
  padding: 0 0 16px;
  background:
    radial-gradient(80% 60% at 50% 88%, #C9E8D2 0%, #DFF3E5 30%, transparent 65%),
    linear-gradient(180deg, #EAF4FF 0%, #F8F1DD 70%, #F0E4C7 100%);
  border: 1.5px solid #E8DCC0;
  border-radius: var(--r-lg);
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-1);
}
.nest-theatre.h-strong{
  background:
    radial-gradient(80% 60% at 50% 88%, #B6E2C5 0%, #DCF1E3 30%, transparent 65%),
    linear-gradient(180deg, #E1EFFF 0%, #FAF3DF 60%, #F4E2C0 100%);
}
.nest-theatre.h-shaky{
  background:
    radial-gradient(80% 60% at 50% 88%, #CFE3D6 0%, #DDE7DC 35%, transparent 65%),
    linear-gradient(180deg, #E6ECF2 0%, #F2EAD4 60%, #EADCBA 100%);
}
.nest-theatre.h-cracked{
  background:
    radial-gradient(80% 60% at 50% 88%, #C9CFC8 0%, #D6D6CE 40%, transparent 65%),
    linear-gradient(180deg, #DBDFE2 0%, #E6E0CA 60%, #D9CCAE 100%);
}
.nest-theatre.h-ruin{
  background:
    radial-gradient(80% 60% at 50% 88%, #B5B2A8 0%, #BAB6AB 40%, transparent 65%),
    linear-gradient(180deg, #C8CACA 0%, #C9C2A8 60%, #B8A988 100%);
}

.nest-stagebar{
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 16px 0;
}
.nest-stage-pill{
  display:inline-flex; align-items:center; gap:6px;
  padding: 4px 10px; border-radius: 999px;
  background: rgba(255,255,255,.7);
  border: 1.5px solid rgba(0,0,0,.06);
  font-family: 'Moneygraphy Pixel', monospace;
  font-size: 11px; letter-spacing: 1px;
  color: var(--brand-3); font-weight: 400;
}
.nest-stage-pill .lv{ color: var(--ink); }
.nest-day-chip{
  display:inline-flex; align-items:center; gap:4px;
  padding: 4px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 800;
  color: var(--fire-shadow); background: #FFF1E1;
  border: 1px solid var(--fire-soft);
}

.nest-svg-wrap{
  position: relative;
  width: 100%; height: 200px;
  margin: 4px 0 0;
  display:flex; align-items:center; justify-content: center;
}
.nest-svg-wrap svg.nest-art{
  width: 220px; height: 200px;
  display:block;
  filter: saturate(calc(1 - var(--decay) * 0.65)) brightness(calc(1 - var(--decay) * 0.08));
  transition: filter .8s ease;
}

/* ── 이미지 기반 둥지 (클레이 아트 에셋) ───────────────────
   PNG 배경이 크림(--paper)이라 시어터 배경도 크림으로 맞춰
   이음매 없이 붙인다. 단계 전환은 opacity 크로스페이드. */
.nest-theatre.nest-img-mode{
  background: var(--paper);
}
.nest-svg-wrap.nest-img-stack{
  height: 210px;
}
.nest-svg-wrap.nest-img-stack .nest-img{
  position: absolute; inset: 0; margin: auto;
  width: 210px; height: 210px; object-fit: contain;
  opacity: 0; transition: opacity .55s ease;
  filter: saturate(calc(1 - var(--decay) * 0.7)) brightness(calc(1 - var(--decay) * 0.06));
  -webkit-user-drag: none; user-select: none;
  pointer-events: none;
}
.nest-svg-wrap.nest-img-stack .nest-img.on{ opacity: 1; }

/* ── 이미지 둥지 Health 모션 (§6.2 4단계 흔들림/균열) ──────
   wobble/wobbleSoft 키프레임은 SVG 둥지와 공유(기존 정의 재사용).
   여기서는 .nest-img(현재 단계)에 연결. h-strong 은 잔잔한 idle 호흡. */
.nest-img-stack .nest-img.on{
  transform-box: border-box; transform-origin: 50% 90%;
}
.nest-theatre.h-strong  .nest-img-stack .nest-img.on{ animation: nestImgIdle 3.4s ease-in-out infinite; }
.nest-theatre.h-shaky   .nest-img-stack .nest-img.on{ animation: wobbleSoft 4.2s ease-in-out infinite; }
.nest-theatre.h-cracked .nest-img-stack .nest-img.on{ animation: wobble 1.8s ease-in-out infinite; }
.nest-theatre.h-ruin    .nest-img-stack .nest-img.on{ animation: wobble 1.1s ease-in-out infinite; }
@keyframes nestImgIdle{
  0%,100%{ transform: translateY(0) rotate(0); }
  50%   { transform: translateY(-3px) rotate(-.5deg); }
}
/* crack-overlay 를 이미지 둥지 본체(아래쪽)에 맞춤 */
.nest-img-stack .crack-overlay{ width: 200px; height: 200px; top: 57%; }
.nest-img-stack .crack-overlay svg{ width: 100%; height: 100%; display:block; }

.nest-svg-wrap svg.nest-art .twig{
  transform-box: fill-box;
  transform-origin: center;
}
.nest-svg-wrap svg.nest-art .twig-new{
  animation: twigStack .68s cubic-bezier(.2,.7,.3,1.3) both;
  animation-delay: calc(var(--new-i, 0) * 35ms);
}
@keyframes twigStack{
  0%   {
    opacity: 0;
    transform: translateY(-26px) rotate(-15deg) scale(.7);
    filter: drop-shadow(0 0 5px #FFD66B) drop-shadow(0 0 2px #F4B400);
  }
  55%  {
    opacity: 1;
    transform: translateY(3px) rotate(3deg) scale(1.08);
    filter: drop-shadow(0 0 6px #FFD66B);
  }
  82%  {
    transform: translateY(-1px) rotate(-1deg) scale(1);
    filter: drop-shadow(0 0 2px #FFD66B);
  }
  100% {
    transform: translateY(0) rotate(0) scale(1);
    filter: drop-shadow(0 0 0 transparent);
  }
}
.nest-svg-wrap svg.nest-art .sparrow-head{
  transform-box: fill-box; transform-origin: 50% 80%;
  animation: sparrowIdle 3.2s ease-in-out infinite;
}
.nest-svg-wrap svg.nest-art .sparrow-body{
  transform-box: fill-box; transform-origin: 50% 50%;
  animation: sparrowIdleBody 3.2s ease-in-out infinite;
}
@keyframes sparrowIdle{
  0%,100%{ transform: translateY(0) rotate(0); }
  50%   { transform: translateY(-1.8px) rotate(-1.2deg); }
}
@keyframes sparrowIdleBody{
  0%,100%{ transform: translateY(0); }
  50%   { transform: translateY(-0.6px); }
}
/* 참새 눈 깜빡임 — sparrowIdle 어휘 확장(둥지 전용 모션). */
.nest-svg-wrap svg.nest-art .sparrow-blink ellipse{ transform-box: fill-box; transform-origin: center; animation: sparrowBlink 4.6s ease-in-out infinite; }
@keyframes sparrowBlink{ 0%, 92%, 100% { transform: scaleY(0); } 95%, 97% { transform: scaleY(1); } }
.nest-theatre.h-shaky .nest-svg-wrap svg.nest-art{ animation: wobbleSoft 4.2s ease-in-out infinite; }
.nest-theatre.h-cracked .nest-svg-wrap svg.nest-art{ animation: wobble 1.8s ease-in-out infinite; }
.nest-theatre.h-ruin .nest-svg-wrap svg.nest-art{ animation: wobble 1.1s ease-in-out infinite; opacity:.82; }

@keyframes wobbleSoft{
  0%,100%{ transform: rotate(-.4deg) translateY(0); }
  50%   { transform: rotate(.4deg) translateY(1px); }
}
@keyframes wobble{
  0%,100%{ transform: rotate(-1.2deg) translateY(0); }
  25%   { transform: rotate(.8deg) translateY(1px); }
  50%   { transform: rotate(-.6deg) translateY(2px); }
  75%   { transform: rotate(1.0deg) translateY(0); }
}

.fall-layer{
  position: absolute; inset: 0; pointer-events: none;
  overflow: hidden;
}
.fall-twig{
  position: absolute; top: -20px;
  font-size: 14px; opacity: 0;
  animation: twigFall 3.2s linear infinite;
}
.nest-theatre.h-strong .fall-twig{ display:none; }
.nest-theatre.h-shaky .fall-twig{ animation-duration: 4.6s; opacity:.55; }
.nest-theatre.h-cracked .fall-twig{ animation-duration: 2.8s; opacity:.8; }
.nest-theatre.h-ruin .fall-twig{ animation-duration: 1.8s; opacity:.95; }
.fall-twig:nth-child(1){ left:14%; animation-delay: 0s;   }
.fall-twig:nth-child(2){ left:32%; animation-delay: 1.1s; font-size:11px; }
.fall-twig:nth-child(3){ left:52%; animation-delay: .6s;  font-size:13px; }
.fall-twig:nth-child(4){ left:72%; animation-delay: 1.8s; }
.fall-twig:nth-child(5){ left:86%; animation-delay: 2.4s; font-size:10px; }
@keyframes twigFall{
  0%   { transform: translateY(0)   rotate(0deg);   opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: .9; }
  100% { transform: translateY(220px) rotate(360deg); opacity: 0; }
}

.crack-overlay{
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 230px; height: 200px;
  pointer-events:none;
  opacity: 0;
  transition: opacity .6s ease;
}
.nest-theatre.h-cracked .crack-overlay{ opacity: .6; }
.nest-theatre.h-ruin    .crack-overlay{ opacity: .95; animation: crackPulse 2.4s ease-in-out infinite; }
@keyframes crackPulse{
  0%,100%{ opacity: .8; }
  50%   { opacity: 1; }
}

.nest-meta{
  padding: 6px 16px 0;
}
.nest-name-row{
  display:flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 8px;
}
.nest-name{
  font-size: 17px; font-weight: 900; color: var(--ink);
  letter-spacing: -.3px;
}
.nest-name .next-arrow{
  font-size: 12px; color: var(--ink-3); font-weight: 700; margin-left: 6px;
}
.nest-health-num{
  font-family: 'Moneygraphy Pixel', monospace;
  font-size: 13px; letter-spacing: 1.5px;
  color: var(--ink-2); font-weight: 400;
}
.nest-health-num b{ color: var(--brand-3); font-weight: 400; }
.nest-theatre.h-shaky   .nest-health-num b{ color: #E08A1A; }
.nest-theatre.h-cracked .nest-health-num b{ color: var(--fire-shadow); }
.nest-theatre.h-ruin    .nest-health-num b{ color: #C0392B; }

.nest-health-bar{
  height: 12px; border-radius: 999px;
  background: rgba(0,0,0,.10);
  position: relative; overflow: hidden;
  box-shadow: inset 0 2px 3px rgba(0,0,0,.10);
}
.nest-health-fill{
  position:absolute; left:0; top:0; bottom:0;
  width: calc(var(--health) * 1%);
  background: linear-gradient(90deg, var(--brand) 0%, #6FE3A1 100%);
  border-radius: 999px;
  transition: width .8s cubic-bezier(.2,.8,.2,1), background .6s ease;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.10);
}
.nest-theatre.h-shaky   .nest-health-fill{ background: linear-gradient(90deg, #F4B400 0%, #FFC966 100%); }
.nest-theatre.h-cracked .nest-health-fill{ background: linear-gradient(90deg, #FF8A3D 0%, #FFA86A 100%); }
.nest-theatre.h-ruin    .nest-health-fill{ background: linear-gradient(90deg, #C0392B 0%, #E66054 100%); }

.nest-health-bar::after{
  content:""; position:absolute; inset:0;
  background:
    linear-gradient(90deg, transparent 24.5%, rgba(0,0,0,.10) 25%, rgba(0,0,0,.10) 25.5%, transparent 26%),
    linear-gradient(90deg, transparent 49.5%, rgba(0,0,0,.10) 50%, rgba(0,0,0,.10) 50.5%, transparent 51%),
    linear-gradient(90deg, transparent 74.5%, rgba(0,0,0,.10) 75%, rgba(0,0,0,.10) 75.5%, transparent 76%);
  pointer-events:none;
  border-radius: 999px;
}

.nest-microcopy{
  margin-top: 10px;
  font-size: 13px; font-weight: 700;
  color: var(--ink-2);
  letter-spacing: -.1px;
  min-height: 19px;
}
.nest-microcopy.warn  { color: #E08A1A; }
.nest-microcopy.danger{ color: var(--fire-shadow); }
.nest-microcopy.crisis{ color: #C0392B; }
.nest-microcopy .em{ font-weight: 900; }

.my-q-count{
  display:inline-flex; align-items:center; justify-content:center;
  font-family:'Moneygraphy Pixel',monospace; font-weight:400;
  letter-spacing:1px;
  min-width:24px; padding:1px 8px;
  border-radius:999px;
  background: var(--brand-soft); color: var(--brand-3);
  font-size: 11px;
  margin-left: 2px;
}
.my-q-card{
  background: var(--card-soft);
  border: 1.5px solid var(--brand-soft);
  border-left: 4px solid var(--brand);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.my-q-card .meta{
  display:flex; align-items:center; gap:6px;
  font-size: 11px; color: var(--ink-3); font-weight: 700;
  margin-bottom: 6px;
}
.my-q-card .meta .bk{
  color: var(--brand-3); font-weight: 800;
}
.my-q-card .meta .dot{ color: var(--ink-4); }
.my-q-card .quote{
  font-size: 14px; line-height: 1.55; color: var(--ink);
  letter-spacing: -0.1px; font-weight: 400;
}
.my-q-card .quote.spoiler,
.sentence-card .quote.spoiler {
  filter: blur(5px);
  cursor: pointer;
  user-select: none;
  transition: filter 0.2s ease;
}
.my-q-card .quote.spoiler:hover,
.sentence-card .quote.spoiler:hover {
  filter: blur(3px);

/* 페이지 기반 스포일러 블라인드 (§5.7.1): 안 읽은 부분 → 탭하면 공개 */
.spoiler-blind{
  display:flex; align-items:center; justify-content:center;
  gap:6px; text-align:center;
  font-size: 13px; font-weight: 800; color: var(--ink-3);
  background: var(--paper-2); border: 1.5px dashed var(--line);
  border-radius: var(--r-md);
  padding: 16px 12px; margin: 4px 0 8px;
  cursor: pointer; user-select: none;
  transition: background 0.15s ease, color 0.15s ease;
}
.spoiler-blind:hover{ background: var(--brand-tint); color: var(--brand-3); }
.my-q-empty{
  background: var(--card);
  border: 1.5px dashed var(--brand-soft);
  border-radius: var(--r-md);
  padding: 18px 16px;
  text-align: center;
  font-size: 13px; color: var(--ink-2); font-weight: 700;
  margin-bottom: 10px;
}
.my-q-empty .ico{ font-size: 24px; display:block; margin-bottom: 6px; }

.book-jump{
  position:absolute; top: 14px; right: 14px;
  display:inline-flex; align-items:center; gap:4px;
  padding: 6px 10px; border-radius: 999px;
  background: var(--brand-tint);
  border: 1.5px solid var(--brand-soft);
  color: var(--brand-3);
  font-size: 12px; font-weight: 800;
  cursor: pointer;
  transition: transform .08s ease, background .15s ease;
}
.book-jump:hover{ background: var(--brand-soft); }
.book-jump:active{ transform: translateY(1px); }
.book-card-wrap{ position: relative; }

.demo-decay{
  margin-top: 8px;
  font-size: 11px; color: var(--ink-3); font-weight: 700;
  text-align: right; padding: 0 4px;
  user-select: none;
}
.demo-decay button{
  border: none; background: transparent;
  color: var(--ink-3); cursor: pointer;
  font: inherit; padding: 4px 8px; border-radius: 6px;
}
.demo-decay button:hover{ background: var(--paper-2); color: var(--ink); }

.checkin-cta{
  margin-top: 18px;
  width: 100%;
  border: none;
  background: var(--brand);
  color: #fff;
  font-size: 18px; font-weight: 900;
  padding: 18px 20px;
  border-radius: var(--r-lg);
  border-bottom: 5px solid var(--brand-shadow);
  cursor: pointer;
  transition: transform .08s ease, border-bottom-width .08s ease;
  letter-spacing: -.3px;
  position: relative;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.checkin-cta:hover{ filter: brightness(1.03); }
.checkin-cta:active{
  transform: translateY(3px);
  border-bottom-width: 2px;
}
.checkin-cta .pulse{
  width: 8px; height: 8px; border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 0 0 rgba(255,255,255,.6);
  animation: pulseDot 1.6s infinite;
}
@keyframes pulseDot{
  0%   { box-shadow: 0 0 0 0 rgba(255,255,255,.7); }
  70%  { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
}

.nudge{
  margin-top: 10px; text-align:center;
  font-size: 13px; color: var(--ink-2); font-weight: 700;
}
.nudge .em{ color: var(--fire-shadow); }

.section-head{
  display:flex; align-items:center; justify-content:space-between;
  margin: 22px 4px 10px;
}
.section-head h3{
  margin: 0; font-size: 15px; font-weight: 900; color: var(--ink);
  display:flex; align-items:center; gap:6px;
}
.section-head .more{
  font-size: 12px; font-weight: 700; color: var(--ink-3);
  background: none; border: none; cursor: pointer;
}

.sentence-card{
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px;
  margin-bottom: 10px;
}
.sentence-card .who{
  display:flex; align-items:center; gap:8px;
  margin-bottom: 6px;
}
.sentence-card .avatar{
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--brand-soft);
  display:flex; align-items:center; justify-content:center;
  font-size: 14px;
}
.sentence-card .nick{ font-size: 13px; font-weight: 800; color: var(--ink); }
.sentence-card .meta{ font-size: 11px; color: var(--ink-3); margin-left: auto; }
.sentence-card .quote{
  font-family: 'Moneygraphy Rounded','Noto Sans KR'; font-weight: 400;
  font-size: 14px; line-height: 1.55;
  color: var(--ink); padding-left: 10px;
  border-left: 3px solid var(--brand-soft);
  margin: 4px 0 8px;
  letter-spacing: -0.1px;
}
.sentence-card .react{
  display:flex; gap:6px; flex-wrap:wrap;
}
.chip{
  display:inline-flex; align-items:center; gap:4px;
  padding: 4px 9px; border-radius: 999px;
  background: var(--paper-2); border: 1px solid var(--line);
  font-size: 12px; font-weight: 700; color: var(--ink-2);
  cursor: pointer;
}
.chip:hover{ background: var(--brand-tint); border-color: var(--brand-soft); color: var(--brand-3); }
.chip.active{ background: var(--brand-soft); border-color: var(--brand); color: var(--brand-3); }

.village-grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.friend-nest{
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 8px 10px;
  text-align:center;
  cursor: pointer;
  transition: transform .12s ease;
  position: relative;
}
.friend-nest:hover{ transform: translateY(-2px); border-color: var(--brand-soft); }
.friend-nest .light{
  position: absolute; top: 8px; right: 10px;
  width: 8px; height: 8px; border-radius: 50%;

}
.friend-nest.on .light{
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold), 0 0 16px var(--gold-2);
}
.friend-nest .nestico{ font-size: 32px; line-height: 1; margin: 4px 0; }
.friend-nest .nick{ font-size: 12px; font-weight: 800; color: var(--ink); margin-bottom: 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.friend-nest .streakmini{
  font-size: 11px; color: var(--fire-shadow); font-weight: 800;
}
.friend-nest .seed{
  position: absolute; left: 6px; top: 6px;
  font-size: 14px; opacity: .85;
  cursor: pointer;
  transition: transform .15s ease;
}
.friend-nest .seed:hover{ transform: scale(1.25) rotate(-12deg); }
.friend-nest .seed.sent{ opacity: .25; cursor: default; }

.league-card{
  background: linear-gradient(160deg, #F1FBF5, #E1F0FF);
  border: 1.5px solid var(--brand-soft);
  border-radius: var(--r-lg);
  padding: 14px;
}
.league-head{
  display:flex; align-items:center; gap:10px; margin-bottom: 10px;
}
.league-badge{
  width: 40px; height: 40px; border-radius: 12px;
  display:flex; align-items:center; justify-content:center;
  background: var(--brand);
  color: #fff; font-size: 22px;
  border-bottom: 3px solid var(--brand-shadow);
}
.league-title{ font-weight: 900; font-size: 16px; color: var(--ink); }
.league-sub{ font-size: 12px; color: var(--ink-2); font-weight: 700; }
.league-list{ display: flex; flex-direction: column; gap: 6px; }
.league-row{
  display:flex; align-items:center; gap:10px;
  padding: 10px 12px; background: var(--card);
  border: 1px solid var(--line); border-radius: var(--r-md);
}
.league-row.me{ border-color: var(--brand); background: var(--brand-tint); }
.league-rank{ font-weight: 900; color: var(--ink-2); width: 22px; text-align:center; }
.league-rank.gold{ color: var(--gold-shadow); }
.league-rank.silver{ color: #8E939B; }
.league-rank.bronze{ color: #B17142; }
.league-avatar{
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--brand-soft);
  display:flex; align-items:center; justify-content:center;
  font-size: 14px;
}
.league-name{ flex:1; font-weight: 800; font-size: 14px; }
.league-xp{ font-weight: 900; color: var(--gold-shadow); font-size: 13px; }

/* 마을 파트 랭킹 (S3: 구 league-* 클래스에서 분리) */
.trank-list{ display: flex; flex-direction: column; gap: 6px; }
.trank-row{
  display:flex; align-items:center; gap:10px;
  padding: 10px 12px; background: var(--card);
  border: 1px solid var(--line); border-radius: var(--r-md);
}
.trank-row.me{ border-color: var(--brand); background: var(--brand-tint); }
.trank-rank{ font-weight: 900; color: var(--ink-2); width: 22px; text-align:center; }
.trank-rank.gold{ color: var(--gold-shadow); }
.trank-rank.silver{ color: #8E939B; }
.trank-rank.bronze{ color: #B17142; }
.trank-avatar{
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--brand-soft);
  display:flex; align-items:center; justify-content:center;
  font-size: 14px;
}
.trank-name{ flex:1; font-weight: 800; font-size: 14px; }
.trank-page{ font-weight: 900; color: var(--gold-shadow); font-size: 13px; }

.shelf-row{
  display:flex; align-items:center; gap: 12px;
  padding: 12px;
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  margin-bottom: 8px;
  cursor: pointer;
}
.shelf-row.active{ border-color: var(--brand); background: var(--brand-tint); }
.shelf-cover{
  width: 42px; height: 58px; border-radius: 6px;
  background: linear-gradient(135deg, #C8DCFF, #6E9BE8);
  flex: none; overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
  position: relative;
}
.shelf-cover img{ width:100%; height:100%; object-fit:cover; display:block; }
.shelf-meta{ flex:1; min-width:0; }
.shelf-title{
  font-weight: 800; font-size: 14px; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.shelf-prog{ font-size: 11px; color: var(--ink-3); font-weight: 700; }
.shelf-active-pill{
  font-size: 10px; font-weight: 800;
  color: var(--brand-3);
  background: var(--brand-soft);
  padding: 3px 7px; border-radius: 999px;
  border: 1px solid var(--brand);
}

.empty{
  text-align:center; padding: 28px 16px; color: var(--ink-3);
  font-size: 13px; font-weight: 700;
}
.empty .ico{ font-size: 32px; display:block; margin-bottom: 8px; }

.tabbar{
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 30;
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--line);
  padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.tab{
  border: none; background: transparent;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding: 6px 0;
  cursor: pointer;
  color: var(--ink-3);
  font-weight: 800; font-size: 11px;
  transition: color .15s ease, transform .12s ease;
}
.tab .ico{ font-size: 22px; line-height: 1; }
.tab.active{ color: var(--brand-3); }
.tab.active .ico{ transform: translateY(-2px) scale(1.05); transition: transform .2s ease; }

.modal-backdrop{
  position: fixed; inset: 0; z-index: 50;
  background: rgba(20,20,30,.45);
  backdrop-filter: blur(2px);
  display: none;
  align-items: flex-end; justify-content: center;
}
.modal-backdrop.show{ display: flex; animation: fadeIn .2s ease both; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.sheet{
  width: 100%; max-width: 430px;
  position: relative;       /* 우상단 닫기(✕) 버튼 기준 (QA #169) */
  background: var(--card);
  border-radius: 28px 28px 0 0;
  padding: 14px 18px 24px;
  animation: slideUp .3s cubic-bezier(.2,.8,.2,1) both;
  max-height: 90vh; overflow-y: auto; overflow-x: hidden;
}
@keyframes slideUp{
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-grip{
  width: 44px; height: 5px; border-radius: 999px;
  background: var(--ink-4); opacity: .35;
  margin: 0 auto 14px;
}
.sheet-head{
  text-align:center; margin-bottom: 16px;
}
.sheet-head h2{
  margin: 0 0 4px; font-size: 20px; font-weight: 900; letter-spacing:-.3px;
}
.sheet-head .sub{
  font-size: 13px; color: var(--ink-2); font-weight: 700;
}
.sheet-section{ margin-top: 14px; }
.sheet-section .label{
  font-size: 12px; font-weight: 800; color: var(--ink-2);
  letter-spacing:.3px; margin-bottom: 8px;
  display:flex; align-items:center; gap:6px;
}

.page-input{
  display:flex; align-items:center; gap:8px;
  background: var(--paper-2);
  border-radius: var(--r-md);
  padding: 8px;
}
.page-btn{
  border: none; background: var(--card);
  border-bottom: 3px solid var(--ink-4);
  border-radius: 12px;
  padding: 8px 12px;
  font-weight: 900; font-size: 14px; color: var(--ink);
  cursor: pointer;
  transition: transform .08s ease, border-bottom-width .08s ease;
  min-width: 46px;
}
.page-btn:active{ transform: translateY(2px); border-bottom-width: 1px; }
.page-num{
  flex: 1; text-align:center;
  font-weight: 900; font-size: 22px; color: var(--ink);
}
.page-direct{
  margin-top: 8px; font-size: 12px; text-align:center;
}
.page-direct input{
  border: 1.5px solid var(--line); border-radius: 10px;
  padding: 6px 10px; font: inherit; font-weight: 800;
  width: 70px; text-align:center;
}
.page-direct input:focus{ outline: none; border-color: var(--brand); }
.page-totalmark{
  display:block; margin-top: 6px; text-align:center;
  font-size: 11px; color: var(--ink-3); font-weight: 700;
}

.sentence-area{
  width: 100%;
  min-height: 84px;
  padding: 12px 14px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--line);
  font-family: 'Moneygraphy Rounded','Noto Sans KR'; font-weight: 400;
  font-size: 14px; line-height: 1.55;
  resize: none;
  background: var(--card-soft);
  color: var(--ink);
  letter-spacing: -0.1px;
}
.sentence-area:focus{ outline: none; border-color: var(--brand); background:#fff; }
.sentence-counter{
  margin-top: 6px; text-align:right;
  font-size: 11px; color: var(--ink-3); font-weight: 700;
}

.submit-btn{
  margin-top: 18px;
  width: 100%;
  background: var(--brand);
  color: #fff;
  font-weight: 900; font-size: 16px;
  border: none;
  border-bottom: 5px solid var(--brand-shadow);
  border-radius: var(--r-lg);
  padding: 16px;
  cursor: pointer;
  transition: transform .08s ease, border-bottom-width .08s ease;
}
.submit-btn:active{ transform: translateY(3px); border-bottom-width: 2px; }
.submit-btn:disabled{
  background: var(--line); color: var(--ink-3);
  border-bottom-color: var(--ink-4);

.ceremony{
  position: fixed; inset: 0; z-index: 100;
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center; justify-content: center;
  overflow: hidden;
}
.ceremony.show{ display: flex; animation: fadeIn .2s ease both; }
.ceremony .inner{
  width: 100%; max-width: 380px;
  padding: 28px 22px;
  text-align:center;
  animation: popIn .5s cubic-bezier(.2,.8,.2,1.2) both;
}
@keyframes popIn{
  0%   { opacity: 0; transform: scale(.85); }
  60%  { opacity: 1; transform: scale(1.04); }
  100% { transform: scale(1); }
}
.ceremony h2{
  font-size: 28px; font-weight: 900; margin: 0 0 6px;
  letter-spacing: -.5px; color: var(--ink);
}
.ceremony .lead{
  font-size: 15px; color: var(--ink-2); font-weight: 700;
  margin-bottom: 22px;
}
.ceremony .em{ color: var(--brand-3); font-weight: 900; }
.reward-grid{
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  margin-bottom: 22px;
}
.reward-card{
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  padding: 16px 8px 12px;
  position: relative;
  animation: rcPop .4s ease both;
}
.reward-card:nth-child(1){ animation-delay: .15s; }
.reward-card:nth-child(2){ animation-delay: .30s; }
.reward-card:nth-child(3){ animation-delay: .45s; }
@keyframes rcPop{
  from { opacity: 0; transform: translateY(14px) scale(.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.reward-card .ico{ font-size: 30px; display:block; margin-bottom: 4px; }
.reward-card .val{ font-weight: 900; font-size: 18px; color: var(--ink); }
.reward-card .lbl{ font-size: 11px; color: var(--ink-3); font-weight: 800; margin-top: 2px; }
.reward-card.fire .val{ color: var(--fire-shadow); }
.reward-card.gold .val{ color: var(--gold-shadow); }
.reward-card.brand .val{ color: var(--brand-3); }
/* XP 보상 분해 칩 (세리머니) — 보너스 발생 시만. 골드 의미체계 */
.xp-breakdown{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:-8px 0 18px; animation: rcPop .4s ease .5s both; }
.xp-part{ display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:999px; background:var(--gold-soft); border:1px solid var(--gold); color:var(--gold-shadow); font-size:12px; font-weight:800; }
.xp-part .ico{ font-size:12px; }
.xp-part b{ font-family:'Moneygraphy Pixel', monospace; font-weight:400; letter-spacing:.5px; color:var(--gold-shadow); }

.ceremony .saved-quote{
  background: var(--brand-tint);
  border-left: 4px solid var(--brand);
  padding: 12px 14px;
  border-radius: 0 12px 12px 0;
  font-family: 'Moneygraphy Rounded','Noto Sans KR'; font-weight: 400;
  font-size: 14px; line-height: 1.55; color: var(--ink);
  text-align: left;
  margin-bottom: 18px;
  max-height: 120px; overflow:hidden;
  letter-spacing: -0.1px;
}
.ceremony .saved-quote .label{
  display:block; font-family: 'Moneygraphy Pixel'; font-size: 10px;
  font-weight: 400; color: var(--brand-3); letter-spacing: 1.2px;
  margin-bottom: 6px; text-transform: uppercase;
}
.nest-up{
  background: linear-gradient(145deg, #FFF8E8, #FFE2A8);
  border: 1.5px solid #F5C875;
  padding: 12px 14px; border-radius: var(--r-md);
  margin-bottom: 16px;
  display:flex; align-items:center; gap: 10px;
  text-align: left;
  animation: rcPop .4s ease .65s both;
}
.nest-up .em{ font-size: 28px; }
.nest-up .text{ font-size: 13px; font-weight: 800; color: var(--ink); }
.nest-up .text small{ display:block; font-weight: 700; color: var(--ink-2); margin-top: 2px; }

.complete-review{
  background: var(--paper-2);
  border: 1.5px solid var(--line);
  border-radius: var(--r-md);
  padding: 14px; margin-bottom: 16px;
  text-align: center;
  animation: rcPop .4s ease .5s both;
}
.complete-review .complete-head{
  font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 10px;
}
.complete-review .rating-stars{
  display: flex; justify-content: center; gap: 4px; margin-bottom: 12px;
}
.complete-review .star{
  background: none; border: none; cursor: pointer; padding: 2px;
  font-size: 28px; line-height: 1; color: var(--line);
  transition: transform .08s ease, color .12s ease;
}
.complete-review .star.on{ color: #F5B301; }
.complete-review .star:active{ transform: scale(1.2); }
.complete-review .review-area{
  width: 100%; box-sizing: border-box;
  min-height: 60px; resize: vertical;
  border: 1.5px solid var(--line); border-radius: var(--r-sm);
  padding: 10px 12px; font: inherit; font-size: 13px; color: var(--ink);
  background: var(--card);
}
.complete-review .review-area:focus{ outline: none; border-color: var(--brand); }

.ceremony .next-btn{
  width: 100%;
  background: var(--brand);
  color: #fff; font-weight: 900; font-size: 16px;
  border: none; border-bottom: 5px solid var(--brand-shadow);
  border-radius: var(--r-lg); padding: 16px;
  cursor: pointer;
  transition: transform .08s ease, border-bottom-width .08s ease;
}
.ceremony .next-btn:active{ transform: translateY(3px); border-bottom-width: 2px; }

.confetti{
  position: fixed; inset: 0; pointer-events: none; z-index: 110; overflow: hidden;
}
.confetti i{
  position: absolute; top: -20px;
  width: 10px; height: 14px; border-radius: 2px;
  opacity: .92;
  animation: fall 2.4s cubic-bezier(.25,.5,.5,1) forwards;
}
@keyframes fall{
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.toast{
  position: fixed; left: 50%; top: 14%;
  transform: translate(-50%, -10px); z-index: 200;
  background: var(--ink); color: #fff;
  padding: 10px 16px; border-radius: 999px;
  font-size: 13px; font-weight: 800;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease, transform .25s ease;
  box-shadow: var(--shadow-2);
}
.toast.show{ opacity: 1; transform: translate(-50%, 0); }

.helper{
  font-size: 11px; color: var(--ink-3); font-weight: 700;
  margin-top: 6px;
}

/* 부트 로딩 */
.rg-boot {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 16px;
  color: var(--ink-3);
  font-size: 13px;
  font-weight: 700;
}
.rg-boot-icon {
  font-size: 40px;
  animation: sparrowBounce 1.2s ease-in-out infinite;
}
@keyframes sparrowBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
</style>
</head>
<body>

<div id="root">
  <div class="rg-boot">
    <span class="rg-boot-icon">🐦</span>
    <span>ReadingGo 로딩 중...</span>
  </div>
</div>

<!-- React 18 CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<!-- Babel standalone (JSX 변환) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Fuse.js (Fuzzy search) -->
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<!-- Supabase (Phase 1) — 백엔드 계층. config/client/adapter는 순수 JS(JSX 아님)라 일반 script. -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/datastore-supabase.js"></script>

<script>
const _RG_V = '65';  // ⚠️ 배포마다 bump — 캐시 스큐(일부 js만 stale → "X is not defined" 간헐 크래시) 방지

async function loadBabel(src) {
  const res = await fetch(src + '?v=' + _RG_V);
  if (!res.ok) throw new Error(src + ' 로드 실패 (HTTP ' + res.status + ')');
  const code = await res.text();
  const { code: js } = Babel.transform(code, {
    presets: ['react'],
    filename: src,
  });
  (0, eval)(js);
}

(async () => {
  try {
    await loadBabel('js/data.js');
    await loadBabel('js/datastore.js');
    await loadBabel('js/components.js');
    await loadBabel('js/search.js');
    await loadBabel('js/nest.js');
    await loadBabel('js/village.js');
    await loadBabel('js/town.js');
    await loadBabel('js/social.js');
    await loadBabel('js/library.js');
    // Phase 1: 로그인 + Supabase 설정 시 DataStore 를 Supabase 로 교체.
    // 미로그인이면 localStorageAdapter 폴백 유지 → Phase 0 데모 동작 그대로(안전).
    try {
      if (window.RG_SB && window.RG_SB.isConfigured && window.RG_SB.isConfigured()) {
        const _u = await window.RG_SB.currentUser();
        if (_u && window.SupabaseDataStore) {
          window.DataStore = window.SupabaseDataStore;
          console.log('[ReadingGo] Supabase DataStore 활성 (로그인됨)');
        }
      }
    } catch (e) { console.warn('[ReadingGo] Supabase 스왑 스킵:', e.message); }
    await loadBabel('js/app.js');
  } catch (err) {
    console.error('[ReadingGo] 로드 실패:', err);
    document.getElementById('root').innerHTML =
      '<div class="rg-boot" style="gap:8px">' +
        '<span style="font-size:36px">🐦</span>' +
        '<p style="margin:0;font-weight:900;color:#2A2D33">앱을 불러오지 못했어요</p>' +
        '<p style="margin:0;font-size:12px;color:#9097A0">' + err.message + '</p>' +
        '<button onclick="location.reload()" style="margin-top:8px;padding:10px 20px;border:none;border-radius:12px;background:#3FD17F;color:#fff;font-weight:900;font-size:14px">다시 시도</button>' +
      '</div>';
  }
})();
</script>

</body>
</html>
