# ReadingGo — Cloudflare Worker (Netlify 대체)
# 배포: npx wrangler deploy
# 시크릿(1회): npx wrangler secret put ALADIN_TTB_KEY
#              npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#              npx wrangler secret put UPSTAGE_API_KEY   (LLM 독서 파트너 #287)
# 마중물 시드는 큐 방식(seed_queue) — 맥미니 collector 가 Supabase 폴링. COLLECTOR_URL/TOKEN 불필요(제거됨).
name = "readinggo"
main = "worker/index.mjs"
compatibility_date = "2026-06-01"

# #871 Vite 전환 — 배포 전 Vite 빌드 실행(Cloudflare Workers Build / 로컬 wrangler deploy 공통).
# ⚠️ Workers Build 가 대시보드 빌드 명령을 별도로 가지면 그쪽도 동일하게 설정 필요.
[build]
command = "cd docs/readinggo && npm ci && npm run build"

# 정적 사이트(Vite 산출물 dist)를 Worker가 서빙. /aladin 외 모든 경로는 에셋.
[assets]
directory = "docs/readinggo/dist"
binding = "ASSETS"

# 비밀 아님(클라에도 공개). service_role·UPSTAGE 키만 `wrangler secret put` 로.
[vars]
SUPABASE_URL = "https://cttllwwkaddghqttyhkg.supabase.co"
ARCHIVE_DAILY_CAP = "3000"
# LLM 독서 파트너 (#287) — provider-agnostic. 키(UPSTAGE_API_KEY)는 secret, 아래 둘은 설정값.
LLM_BASE_URL = "https://api.upstage.ai/v1"
LLM_MODEL = "solar-pro3"
# 배치 OCR 강조 추출 (#844) — Gemini Flash vision. 키(GEMINI_API_KEY)는 secret, 아래 둘은 설정값.
VISION_BASE_URL = "https://generativelanguage.googleapis.com/v1beta/openai"
VISION_MODEL = "gemini-2.5-flash"
# LLM_REASONING_EFFORT = "low"   # 미설정=추론 최소. 질문이 밋밋하면 low|medium|high 로.

# 일일 인기도서 아카이브 (#239) — UTC 18:00 = KST 03:00
# */10 = 문의→GitHub 이슈 동기화 (#701, GITHUB_TOKEN 시크릿 필요. 미설정 시 no-op)
[triggers]
crons = ["0 18 * * *", "*/10 * * * *"]
