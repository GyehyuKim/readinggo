# OTA 릴리스 자동화 — main 머지 → beta 채널 자동 publish (#876 페이즈 C, 이슈 #982)
#
# 흐름(spec ota.md §4): main 머지 → Vite build(dist) → @capgo/cli 로 dist zip + SHA-256
#   → R2(readinggo-ota) 업로드 → KV(OTA_KV) `ota:android:beta` 매니페스트 갱신.
#   = 베타 채널 자동 publish. prod 승격은 수동(ota-promote.yml, workflow_dispatch) — 앱판 카나리.
#
# 인프라(전부 기설정, 이 워크플로우는 정책 코드만 — 앱/계약 코드 무변경):
#   - Worker /api/ota         : PR #980 머지됨. KV `ota:android:<channel>` JSON 을 읽어 앱에 반환.
#   - KV namespace OTA_KV      : id e22049c87f9d44139242316c3c445bf9 (wrangler.toml 바인딩됨).
#   - R2 bucket readinggo-ota  : PUBLIC 활성. 공개 URL base = https://pub-6a6b161169dd4882a91d87901685fa58.r2.dev
#                                (키 X 로 올린 객체는 <base>/X 로 다운로드 가능).
#   - 시크릿                    : CLOUDFLARE_API_TOKEN · CLOUDFLARE_ACCOUNT_ID (preview-smoke 와 공유, repo Settings→Secrets).
#
# ⚠️ 선행: 페이즈 B(PR #983) 머지 필수. @capgo/cli 의 `bundle zip` 은 (a) `@capgo/capacitor-updater`
#   가 node_modules 에 있는지, (b) 빌드 산출물이 `notifyAppReady()` 를 호출하는지 검사한다.
#   둘 다 #983 이 추가한다. #983 전엔 zip 스텝이 실패(=안전망: 미완성 셸 번들을 publish 하지 않음).
#   (b) 코드 체크는 의도적으로 유지한다(롤백 안전망). 단 (a) 의존성 체크는 --no-code-check 로도 못 끈다 —
#   #983 머지가 진짜 선행 조건.
#
# semver 규칙: @capgo/cli 는 비-semver(예: 2026.06.24-sha)를 invalid_semver 로 거부한다.
#   → 버전은 `1.0.<run_number>`(단조 증가). git sha·날짜는 매니페스트 METADATA(sha/date)로만 싣는다
#   (워커는 version/url/checksum/minNative 만 사용 — sha/date 는 운영 추적용 무해 필드).
name: ota-release

on:
  workflow_dispatch:
    inputs:
      sha:
        description: stable dev에서 검증된 main SHA
        required: true
        type: string

# 연속 머지 시 직렬화(KV/R2 동시 쓰기로 인한 매니페스트-자산 불일치 방지). 진행 중인 릴리스는 취소 안 함.
concurrency:
  group: ota-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ota-release:
    name: build → zip → R2 → KV(beta)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gate on main HEAD and stable DEV receipt
        env:
          APPROVED_SHA: ${{ inputs.sha }}
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$APPROVED_SHA"
          test "$(git rev-parse origin/main)" = "$APPROVED_SHA"
          curl -fsS https://readinggo-dev.hyuniverse.workers.dev/api/release > /tmp/dev-release.json
          test "$(jq -r .environment /tmp/dev-release.json)" = development
          test "$(jq -r .sha /tmp/dev-release.json)" = "$APPROVED_SHA"

      # Vite 빌드 → docs/readinggo/dist. @capgo/capacitor-updater 도 여기서 설치됨(#983 의존성, zip 검사 통과 전제).
      - name: Build web bundle (Vite)
        working-directory: docs/readinggo
        run: |
          npm ci
          npm run build

      # dist 를 zip + sha256 hex. --json 으로 filename/checksum 파싱.
      # 버전 = 1.0.<run_number>(semver, 단조). code-check 유지(notifyAppReady 안전망, #983 필요).
      # 출력: com.readinggo.app_<version>.zip (dist 내용물 zip), JSON {"bundle","filename","checksum"}.
      - name: Bundle zip + checksum (Capgo CLI)
        id: bundle
        working-directory: docs/readinggo
        env:
          VERSION: 1.0.${{ github.run_number }}
        run: |
          set -o pipefail
          OUT=$(npx -y @capgo/cli@latest bundle zip com.readinggo.app --path dist --bundle "$VERSION" --json)
          echo "$OUT"
          FILENAME=$(printf '%s' "$OUT" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const m=s.match(/\{[\s\S]*\}/);process.stdout.write(JSON.parse(m[0]).filename)})')
          CHECKSUM=$(printf '%s' "$OUT" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const m=s.match(/\{[\s\S]*\}/);process.stdout.write(JSON.parse(m[0]).checksum)})')
          if [ -z "$FILENAME" ] || [ -z "$CHECKSUM" ]; then
            echo "::error::capgo --json 에서 filename/checksum 추출 실패. 출력 위 참고."
            exit 1
          fi
          if [ ! -f "$FILENAME" ]; then
            echo "::error::zip 파일이 없음: $FILENAME (cwd=$(pwd))"
            exit 1
          fi
          {
            echo "version=$VERSION"
            echo "filename=$FILENAME"
            echo "checksum=$CHECKSUM"
          } >> "$GITHUB_OUTPUT"
          echo "✅ bundled $FILENAME (sha256=$CHECKSUM)"

      # R2(public) 업로드 → 공개 URL = <base>/<filename> 로 앱이 다운로드.
      - name: Upload bundle to R2
        working-directory: docs/readinggo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FILENAME: ${{ steps.bundle.outputs.filename }}
        run: |
          # --remote 필수: wrangler v4 는 local-first(기본=로컬 miniflare). 빼면 실제 R2 에 안 올라가고
          #   job 은 success 로 끝난다(로그에 "Resource location: local"). #990.
          npx -y wrangler@4 r2 object put "readinggo-ota/${FILENAME}" \
            --file "${FILENAME}" \
            --content-type application/zip \
            --remote

      # beta 채널 매니페스트 갱신. 워커는 version·url·checksum·minNative 를 사용.
      # minNative=1: 현재 Capgo 셸의 Android versionCode. 향후 네이티브 릴리스가 versionCode 를 올리고
      #   그 새 네이티브 API 를 쓰는 번들을 낼 때, 이 값을 그 셸 버전으로 상향한다 → 구 셸은 해당 번들을
      #   스킵하고 "스토어 업데이트" 배너를 띄운다(spec §1·§5, 크래시 원천 차단). 지금은 셸 변경 없으니 1.
      # sha/date: 운영 추적용 메타데이터(워커 무시). semver 가 git sha 를 못 담으므로 여기 별도 기록.
      - name: Publish beta manifest to KV
        working-directory: docs/readinggo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION: ${{ steps.bundle.outputs.version }}
          FILENAME: ${{ steps.bundle.outputs.filename }}
          CHECKSUM: ${{ steps.bundle.outputs.checksum }}
          GIT_SHA: ${{ github.sha }}
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          URL="https://pub-6a6b161169dd4882a91d87901685fa58.r2.dev/${FILENAME}"
          # JSON 은 node 로 안전하게 직렬화(따옴표/이스케이프 사고 방지).
          MANIFEST=$(VERSION="$VERSION" URL="$URL" CHECKSUM="$CHECKSUM" GIT_SHA="$GIT_SHA" DATE="$DATE" node -e '
            const o = {
              version: process.env.VERSION,
              url: process.env.URL,
              checksum: process.env.CHECKSUM,
              minNative: 1,
              sha: process.env.GIT_SHA,
              date: process.env.DATE,
            };
            process.stdout.write(JSON.stringify(o));
          ')
          echo "manifest: $MANIFEST"
          # --remote 필수: 없으면 로컬 KV 에만 쓰여 실제 매니페스트가 안 올라간다(#990).
          npx -y wrangler@4 kv key put --remote --namespace-id e22049c87f9d44139242316c3c445bf9 \
            "ota:android:beta" "$MANIFEST"
          {
            echo "### OTA beta published 🚀"
            echo ""
            echo "- version: \`$VERSION\`"
            echo "- url: $URL"
            echo "- checksum: \`$CHECKSUM\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "✅ beta 매니페스트 갱신: $VERSION → $URL"
