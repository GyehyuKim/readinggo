name: test

on:
  workflow_dispatch:        # 수동 배포 — 크레딧 모아 한 번에 (Netlify 무료 한도 절약)
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: contracts (books.tsv schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate books.tsv
        run: python tests/data/validate-books.py

  spec-align:
    name: spec-align (스펙↔구현 동기화 게이트)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # spec(docs/readinggo/specs/)와 구현(docs/readinggo/js/)이 어긋나면 실패.
      # 새 기능은 align_v7.py에 invariant를 추가해 "스펙=구현"을 강제한다 (CONTRIBUTING §4.1).
      - name: Spec-align invariants
        run: python tests/spec-align/align_v7.py

  issue-link:
    name: issue-link (PR↔이슈 연결 강제)
    if: github.event_name == 'pull_request'   # PR 에만 적용 (main push 는 skip)
    runs-on: ubuntu-latest
    steps:
      # PR 본문에 "Closes/Fixes/Resolves/Refs #숫자" 또는 "no-issue: <사유>" 가 없으면 실패.
      # 이슈 연결을 강제 → 머지 시 자동 close → 이슈 정리가 한 사람에게 쏠리지 않는다 (CONTRIBUTING §4.2).
      - name: Require issue reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$PR_BODY" | grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?|refs?)[: ]+#[0-9]+|no-issue:[[:space:]]*[^[:space:]]'; then
            echo "✅ 이슈 연결(Closes/Refs #N) 또는 no-issue 사유 확인"
          else
            echo "::error::PR 본문에 이슈 연결이 없습니다. 완료=「Closes #N」(머지 시 자동 close)·부분=「Refs #N」, 이슈 불필요 시=「no-issue: <사유>」를 본문에 넣어주세요 (CONTRIBUTING §4.2)."
            exit 1
          fi

  detect:
    name: detect (서빙 파일 변경 감지 — 배포 낭비 차단)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      servable: ${{ steps.f.outputs.servable }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      # 실제 서빙되는 파일(js·index.html·data·함수·toml)이 바뀐 머지만 배포 → spec/docs-only 머지는 스킵(Netlify 크레딧 절약).
      - id: f
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^docs/readinggo/(js/|data/|index\.html|fonts/)|^netlify/functions/|^netlify\.toml$'; then
            echo "servable=true" >> "$GITHUB_OUTPUT"
          else
            echo "스킵: 서빙 파일 변경 없음(spec/docs-only) → 배포 안 함"
            echo "servable=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: deploy (Netlify · 서빙 변경 시 / 수동)
    needs: [contracts, spec-align, detect]
    # 테스트 통과 + (수동 트리거 || 서빙 파일이 바뀐 main push)에만 배포.
    if: >
      always() &&
      needs.contracts.result == 'success' && needs.spec-align.result == 'success' &&
      ( github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect.outputs.servable == 'true') )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NETLIFY_AUTH_TOKEN 1개만 GitHub repo Secrets 에 추가하면 동작 (site id 는 비밀 아님).
      - name: Deploy docs/readinggo to Netlify (prod)
        run: npx netlify-cli@latest deploy --dir=docs/readinggo --prod --site 1fe57f63-c532-4887-afbc-da1749a08d64 --auth "$NETLIFY_AUTH_TOKEN" --message "deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
