name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 배포는 Cloudflare Workers Build(main 푸시 시 자동)가 담당 — Netlify deploy job 제거(#254).

jobs:
  spec-align:
    name: spec-align (스펙↔구현 동기화 게이트)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # spec(docs/readinggo/specs/)와 구현(docs/readinggo/js/)이 어긋나면 실패.
      # 새 기능은 align_v7.py에 invariant를 추가해 "스펙=구현"을 강제한다 (CONTRIBUTING §4.1).
      - name: Spec-align invariants
        run: python tests/spec-align/align_v7.py

  design-lint:
    name: design-lint (DESIGN.md UI 규칙 — 이모지·토큰·tonal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # docs/readinggo/js/** 와 index.html 이 DESIGN.md UI 규칙(기능 이모지→RG_ICONS,
      # 오프팔레트 raw hex→var(--token), ghost 버튼→2차 tonal)을 위반하면 실패 (#1062).
      # radius 는 warning 으로만 카운트(exit 미반영) — design_lint.py 정책 참조.
      - name: DESIGN.md lint
        run: python tests/spec-align/design_lint.py

  contract:
    name: contract (DataStore 계약 — UI 호출↔어댑터)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 피처가 호출하는 DataStore.X.method() 가 supabase 어댑터에 실제 존재하는지 정적 검증 (#257).
      - name: DataStore contract
        run: node tests/contract/datastore-contract.mjs

  regression:
    name: regression (핵심 순수 로직·오류 분기)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 존재하지만 CI 밖에 있던 순수 Node 회귀 테스트를 명시적으로 모두 실행한다 (#1298).
      - name: Core regression tests
        run: |
          node tests/decode-entities.test.mjs
          node tests/book-detail-hierarchy.test.mjs
          node tests/barcode-focus.test.mjs
          node tests/liked-sentence-consistency.test.mjs
          node tests/nest-cycle.test.mjs
          node tests/ocr-response.test.mjs
          node tests/ocr-review-flow.test.mjs
          node --test tests/posthog-weekly-report.test.mjs
          node tests/prompt-lab.test.mjs
          node tests/related-filter.test.mjs
          node tests/sentence-book-binding.test.mjs
          node tests/streak-checkin.test.mjs
          node tests/supabase-books.test.mjs
          node tests/turnstile-retry.test.mjs
          node tests/wiki-ask-response.test.mjs

  boot-smoke:
    name: boot-smoke (Vite 빌드 회귀)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # #871 Vite 전환 — 런타임 Babel 폐기. Vite 빌드가 성공하고 dist 가 해시 번들/#root 를 갖는지 검증.
      - name: Vite build
        run: cd docs/readinggo && npm ci && npm run build
      - name: Boot smoke (dist 검증)
        run: |
          node tests/boot-smoke.mjs
          node tests/dev-review-mode.test.mjs

  dev-isolation:
    name: dev-isolation (prod endpoint/write path 차단)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build a synthetic DEV bundle
        working-directory: docs/readinggo
        env:
          VITE_SUPABASE_URL: https://synthetic-dev.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: synthetic-public-key
          VITE_API_ORIGIN: https://readinggo-dev.hyuniverse.workers.dev
          VITE_READINGGO_ENV: development
        run: npm ci && npm run build
      - name: Assert production endpoints and bindings are absent
        env:
          EXPECTED_DEV_SUPABASE_URL: https://synthetic-dev.supabase.co
          EXPECTED_DEV_WORKER_URL: https://readinggo-dev.hyuniverse.workers.dev
          EXPECT_REVIEW_MODE: "1"
        run: |
          node tests/dev-isolation.test.mjs
          node tests/dev-review-mode.test.mjs

  render-smoke:
    name: render-smoke (탭 런타임 렌더)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # #886 — boot-smoke 가 못 잡는 런타임 렌더 회귀(#884 책장 크래시류)를 헤드리스로 전 탭 클릭해 차단.
      - name: Build + headless browser
        run: cd docs/readinggo && npm ci && npm run build && npx playwright install --with-deps chromium
      - name: Render smoke (전 탭)
        run: |
          cd docs/readinggo
          npm run preview &
          for i in $(seq 1 30); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 1; done
          SMOKE_URL=http://localhost:4173/ npm run smoke

  lint:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 최소 룰셋(noDebugger·중복키)으로 시작 — 점진 강화 (#258).
      # --yes: npx 가 미캐시 패키지 설치 확인 프롬프트에서 hang 하는 것 방지(비-TTY CI 멈춤, #797 QA).
      - name: Biome lint
        run: npx --yes @biomejs/biome@2 lint

  issue-link:
    name: issue-link (PR↔이슈 연결 강제)
    if: github.event_name == 'pull_request'   # PR 에만 적용 (main push 는 skip)
    runs-on: ubuntu-latest
    steps:
      # PR 본문에 "Closes/Fixes/Resolves/Refs #숫자" 또는 "no-issue: <사유>" 가 없으면 실패.
      # 이슈 연결을 강제 → 머지 시 자동 close → 이슈 정리가 한 사람에게 쏠리지 않는다 (CONTRIBUTING §4.2).
      - name: Require issue reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$PR_BODY" | grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?|refs?)[: ]+#[0-9]+|no-issue:[[:space:]]*[^[:space:]]'; then
            echo "✅ 이슈 연결(Closes/Refs #N) 또는 no-issue 사유 확인"
          else
            echo "::error::PR 본문에 이슈 연결이 없습니다. 완료=「Closes #N」(머지 시 자동 close)·부분=「Refs #N」, 이슈 불필요 시=「no-issue: <사유>」를 본문에 넣어주세요 (CONTRIBUTING §4.2)."
            exit 1
          fi

  spec-coverage:
    name: spec-coverage (코드 변경 ↔ spec 동반 강제)
    if: github.event_name == 'pull_request'   # PR 에만 적용
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Vite entrypoint·Worker·SQL도 동작/계약 변경이므로 spec 동반 또는 no-spec 사유를 요구한다.
      # 순수 CI·빌드·스타일 변경은 "no-spec: <사유>"로 명시 면제한다.
      - name: Require spec change or no-spec rationale
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          RUNTIME=$(printf '%s\n' "$CHANGED" | grep -E '^(docs/readinggo/js/.*\.(js|mjs)|docs/readinggo/(main\.js|setup-globals\.js|index\.html|capacitor\.config\.json)|worker/|docs/readinggo/supabase/.*\.sql$)' || true)
          SPEC=$(printf '%s\n' "$CHANGED" | grep -E '^docs/readinggo/specs/.*\.md$' || true)
          if [ -z "$RUNTIME" ]; then echo "✅ 런타임·Worker·SQL 변경 없음 — spec 불필요"; exit 0; fi
          if [ -n "$SPEC" ]; then echo "✅ 런타임 변경에 spec 동반"; exit 0; fi
          if printf '%s' "$PR_BODY" | grep -qiE 'no-spec:[[:space:]]*[^[:space:]]'; then
            echo "✅ no-spec 사유 명시(폴리시/CI 등 spec 불필요)"; exit 0
          fi
          echo "::error::런타임·Worker·SQL을 바꿨는데 spec(docs/readinggo/specs)도 'no-spec: <사유>'도 없습니다. 동작 변경이면 해당 spec(.md)을 같이 갱신하고, 순수 시각·카피·CI 폴리시면 PR 본문에 'no-spec: <사유>'를 넣어주세요 (CONTRIBUTING §4.1 — spec-first)."
          echo "--- spec 없이 바뀐 runtime paths ---"; printf '%s\n' "$RUNTIME"
          exit 1

  migrations:
    name: migrations (Supabase 마이그레이션 적용 검증)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # docs/readinggo/supabase/*.sql 의 add column/create table 가 라이브 DB에
      # 실제 적용됐는지 information_schema 와 대조 (read-only, DDL 미실행).
      # 코드/.sql은 머지됐는데 DB 미적용이면 런타임 400(column does not exist)으로
      # 조용히 실패 → 머지 전 감지 (#633, 2026-06-16 QA: 11/22/23/24 누락 사례).
      # SUPABASE_ACCESS_TOKEN secret 미설정 시 skip(점진 도입).
      - name: Check migrations applied to live DB
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN secret 미설정 — 마이그레이션 검사 skip. repo Settings→Secrets and variables→Actions 에 등록하면 활성화됩니다 (#633)."
            exit 0
          fi
          python tests/spec-align/migrations_applied.py

# (deploy/detect 제거됨 — 배포는 Cloudflare Workers Build가 main 푸시 시 자동 처리)
