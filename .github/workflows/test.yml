name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 배포는 Cloudflare Workers Build(main 푸시 시 자동)가 담당 — Netlify deploy job 제거(#254).

jobs:
  contracts:
    name: contracts (books.tsv schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate books.tsv
        run: python tests/data/validate-books.py

  spec-align:
    name: spec-align (스펙↔구현 동기화 게이트)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # spec(docs/readinggo/specs/)와 구현(docs/readinggo/js/)이 어긋나면 실패.
      # 새 기능은 align_v7.py에 invariant를 추가해 "스펙=구현"을 강제한다 (CONTRIBUTING §4.1).
      - name: Spec-align invariants
        run: python tests/spec-align/align_v7.py

  contract:
    name: contract (DataStore 계약 — UI 호출↔어댑터)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 피처가 호출하는 DataStore.X.method() 가 supabase 어댑터에 실제 존재하는지 정적 검증 (#257).
      - name: DataStore contract
        run: node tests/contract/datastore-contract.mjs

  boot-smoke:
    name: boot-smoke (부팅 Babel 변환 회귀)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # index.html이 자체 호스팅 Babel(vendor/)로 loadBabel하는 js를 동일 옵션으로 변환,
      # automatic runtime 회귀(#687 전사이트 "Cannot use import statement" 크래시)를 빌드 없이 차단 (#691).
      - name: Boot smoke (vendor babel transform)
        run: node tests/boot-smoke.mjs

  lint:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 최소 룰셋(noDebugger·중복키)으로 시작 — 점진 강화 (#258).
      # --yes: npx 가 미캐시 패키지 설치 확인 프롬프트에서 hang 하는 것 방지(비-TTY CI 멈춤, #797 QA).
      - name: Biome lint
        run: npx --yes @biomejs/biome@2 lint

  issue-link:
    name: issue-link (PR↔이슈 연결 강제)
    if: github.event_name == 'pull_request'   # PR 에만 적용 (main push 는 skip)
    runs-on: ubuntu-latest
    steps:
      # PR 본문에 "Closes/Fixes/Resolves/Refs #숫자" 또는 "no-issue: <사유>" 가 없으면 실패.
      # 이슈 연결을 강제 → 머지 시 자동 close → 이슈 정리가 한 사람에게 쏠리지 않는다 (CONTRIBUTING §4.2).
      - name: Require issue reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$PR_BODY" | grep -qiE '(close[sd]?|fix(e[sd])?|resolve[sd]?|refs?)[: ]+#[0-9]+|no-issue:[[:space:]]*[^[:space:]]'; then
            echo "✅ 이슈 연결(Closes/Refs #N) 또는 no-issue 사유 확인"
          else
            echo "::error::PR 본문에 이슈 연결이 없습니다. 완료=「Closes #N」(머지 시 자동 close)·부분=「Refs #N」, 이슈 불필요 시=「no-issue: <사유>」를 본문에 넣어주세요 (CONTRIBUTING §4.2)."
            exit 1
          fi

  migrations:
    name: migrations (Supabase 마이그레이션 적용 검증)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # docs/readinggo/supabase/*.sql 의 add column/create table 가 라이브 DB에
      # 실제 적용됐는지 information_schema 와 대조 (read-only, DDL 미실행).
      # 코드/.sql은 머지됐는데 DB 미적용이면 런타임 400(column does not exist)으로
      # 조용히 실패 → 머지 전 감지 (#633, 2026-06-16 QA: 11/22/23/24 누락 사례).
      # SUPABASE_ACCESS_TOKEN secret 미설정 시 skip(점진 도입).
      - name: Check migrations applied to live DB
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN secret 미설정 — 마이그레이션 검사 skip. repo Settings→Secrets and variables→Actions 에 등록하면 활성화됩니다 (#633)."
            exit 0
          fi
          python tests/spec-align/migrations_applied.py

# (deploy/detect 제거됨 — 배포는 Cloudflare Workers Build가 main 푸시 시 자동 처리)
