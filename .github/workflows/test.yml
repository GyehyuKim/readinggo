name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: contracts (books.tsv schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate books.tsv
        run: python tests/data/validate-books.py

  spec-align:
    name: spec-align (스펙↔구현 동기화 게이트)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # spec(docs/readinggo/specs/)와 구현(docs/readinggo/js/)이 어긋나면 실패.
      # 새 기능은 align_v7.py에 invariant를 추가해 "스펙=구현"을 강제한다 (CONTRIBUTING §4.1).
      - name: Spec-align invariants
        run: python tests/spec-align/align_v7.py

  deploy:
    name: deploy (Netlify · main 머지 시 자동)
    needs: [contracts, spec-align]          # 테스트 통과해야만 배포
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'  # PR 아닌 main push만
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NETLIFY_AUTH_TOKEN 1개만 GitHub repo Secrets 에 추가하면 동작 (site id 는 비밀 아님).
      - name: Deploy docs/readinggo to Netlify (prod)
        run: npx netlify-cli@latest deploy --dir=docs/readinggo --prod --site 1fe57f63-c532-4887-afbc-da1749a08d64 --auth "$NETLIFY_AUTH_TOKEN" --message "auto-deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
